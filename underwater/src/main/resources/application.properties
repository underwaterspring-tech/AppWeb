server.port=8080
spring.application.name=underwater

# MongoDB principal (BD: Datos)
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017

# Multipart — subida de imágenes hasta 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# Carpeta donde se guardan las imágenes
app.upload.dir=src/main/resources/static/uploads/productos

# Logging
logging.level.com.underwater=DEBUG
