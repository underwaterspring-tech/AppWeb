<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img">
  <title>Underwater</title>

  <defs>
    <clipPath id="circ"><circle cx="110" cy="110" r="96"/></clipPath>
    <style>
      @keyframes waveA { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-22px)} }
      @keyframes waveB { 0%,100%{transform:translateX(0)} 50%{transform:translateX(22px)} }
      @keyframes waveC { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-14px)} }
      .wA { animation: waveA 3.2s ease-in-out infinite; }
      .wB { animation: waveB 3.8s ease-in-out infinite; }
      .wC { animation: waveC 2.9s ease-in-out infinite; }
    </style>
  </defs>

  <circle cx="110" cy="110" r="96" fill="#f2faf8"/>
  <circle cx="110" cy="110" r="96" fill="none" stroke="#2ec4b0" stroke-width="1.5" opacity="0.6"/>
  <circle cx="110" cy="110" r="91" fill="none" stroke="#2ec4b0" stroke-width="0.5" opacity="0.25"/>

  <g clip-path="url(#circ)">
    <rect x="0" y="148" width="220" height="72" fill="#0a3d37"/>
    <path class="wA" d="M-10 140 Q18 118 46 140 Q74 162 102 140 Q130 118 158 140 Q186 162 230 140" fill="none" stroke="#2ec4b0" stroke-width="3" stroke-linecap="round"/>
    <path class="wB" d="M-10 156 Q20 134 48 156 Q76 178 104 156 Q132 134 160 156 Q188 178 230 156" fill="none" stroke="#2ec4b0" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path class="wC" d="M-10 170 Q22 151 52 170 Q82 189 112 170 Q142 151 172 170 Q202 189 230 170" fill="none" stroke="#9eded6" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <path d="M-10 148 Q18 126 46 148 Q74 170 102 148 Q130 126 158 148 Q186 170 230 148 L230 220 L-10 220 Z" fill="#0d4f47" opacity="0.8"/>
  </g>

  <path d="M72 44 L72 118 Q72 162 110 162 Q148 162 148 118 L148 44"
    fill="none" stroke="#f2faf8" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M72 44 L72 118 Q72 162 110 162 Q148 162 148 118 L148 44"
    fill="none" stroke="#0a3d37" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="72" cy="42" r="5.5" fill="#9eded6"/>
  <circle cx="148" cy="42" r="5.5" fill="#9eded6"/>

  <circle cx="86" cy="72" r="2.5" fill="#2ec4b0" opacity="0.4"/>
  <circle cx="136" cy="60" r="2" fill="#2ec4b0" opacity="0.3"/>
  <circle cx="98" cy="50" r="1.5" fill="#2ec4b0" opacity="0.35"/>

  <!-- UNDERWATER en blanco sobre la franja oscura -->
  <text x="110" y="202" font-family="Georgia, serif" font-size="12" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#ffffff">UNDERWATER</text>
</svg>
