# Puerto del servidor
server.port=8080

# Nombre de la aplicación
spring.application.name=underwater

# ── MongoDB ──────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/underwater_db

# ── CORS (permite peticiones desde tu frontend) ──────────────
underwater.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://127.0.0.1:5500,http://localhost:5500

# ── Logging ──────────────────────────────────────────────────
logging.level.com.nexoshop=DEBUG